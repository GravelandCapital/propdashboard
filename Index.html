<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funded Fleet | Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans tracking-tight">

    <nav class="fixed left-0 top-0 h-screen w-64 bg-slate-900 border-r border-slate-800 p-6 z-40">
        <div class="mb-12">
            <h1 class="text-2xl font-black text-white uppercase italic tracking-tighter">Funded Fleet</h1>
            <p id="cloudStatus" class="text-amber-500 text-[10px] font-bold uppercase italic mt-1">☁️ Connecting...</p>
        </div>
        <ul class="space-y-4">
            <li><button onclick="showSection('fleet')" class="nav-btn active w-full text-left p-4 rounded-2xl font-bold transition flex items-center gap-3"><span>🛸</span> Funded Fleet</button></li>
            <li><button onclick="showSection('payouts')" class="nav-btn w-full text-left p-4 rounded-2xl font-bold transition flex items-center gap-3"><span>💰</span> Payouts</button></li>
            <li><button onclick="showSection('subscriptions')" class="nav-btn w-full text-left p-4 rounded-2xl font-bold transition flex items-center gap-3"><span>📅</span> Subscriptions</button></li>
        </ul>
        <div class="absolute bottom-10 left-6 right-6">
            <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Total Payouts</p>
            <h2 id="payoutDisplay" class="text-3xl font-black text-emerald-400 payout-glow italic tracking-tighter">$0</h2>
        </div>
    </nav>

    <main class="ml-64 p-10">
        <section id="fleet-section" class="content-section">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-white italic uppercase">Fleet Dashboard</h2>
                <button onclick="window.openModal('setupModal')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-2xl transition shadow-lg active:scale-95">+ NEW ACCOUNT</button>
            </div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-8"></div>
        </section>

        <section id="payouts-section" class="content-section hidden">
            <h2 class="text-3xl font-black text-white italic uppercase mb-8">Income Calendar</h2>
            <div id="payoutCalendar" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="subscriptions-section" class="content-section hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-white italic uppercase">Renewal Tracker</h2>
                <button onclick="window.openModal('subModal')" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-2xl transition shadow-lg">+ NEW SUBSCRIPTION</button>
            </div>
            <div id="subGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <div id="setupModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-8 rounded-[2rem] max-w-md w-full border border-slate-800">
            <h2 class="text-xl font-bold mb-6 text-white text-center italic">New Deployment</h2>
            <div class="space-y-4">
                <input type="text" id="mName" placeholder="Account Name" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="mTarget" placeholder="Target $" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                    <input type="number" id="mCons" placeholder="Consistency %" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="mMinDays" placeholder="Min Days" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                    <input type="number" id="mMinProfit" placeholder="Min $/Day" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                </div>
                <input type="number" id="mMinBalance" placeholder="Min Balance for Payout $" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                <button onclick="window.createAccount()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-white mt-4 active:scale-95 transition">Deploy</button>
                <button onclick="window.closeModal('setupModal')" class="w-full text-slate-500 text-xs font-bold mt-2 uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] max-w-2xl w-full max-h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 id="detailsTitle" class="text-2xl font-black text-white italic tracking-tighter uppercase">Audit Log</h2>
                <button onclick="window.closeModal('detailsModal')" class="text-slate-500 hover:text-white text-2xl">✕</button>
            </div>
            <div class="bg-slate-950 p-4 rounded-2xl mb-6 border border-slate-800 flex gap-3 items-end">
                <div class="flex-1"><label class="text-[9px] font-bold text-slate-500 block ml-1 uppercase">Profit</label><input type="number" id="manualProfit" class="w-full bg-slate-800 p-2 rounded-lg text-white border border-slate-700 outline-none"></div>
                <div class="flex-1"><label class="text-[9px] font-bold text-slate-500 block ml-1 uppercase">Date</label><input type="date" id="manualDate" class="w-full bg-slate-800 p-2 rounded-lg text-white border border-slate-700 outline-none text-sm"></div>
                <button onclick="window.addManualDay()" class="bg-emerald-600 px-6 py-2 rounded-lg text-sm font-bold h-[42px] active:scale-95 transition">Add</button>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-3"></div>
        </div>
    </div>

    <div id="payoutModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] max-w-sm w-full text-center">
            <div class="text-5xl mb-4">💰</div>
            <h2 class="text-2xl font-bold mb-6 text-white italic uppercase">Claim Payout</h2>
            <input type="number" id="payoutInput" placeholder="Amount $" class="bg-slate-800 p-4 rounded-xl border border-slate-700 w-full text-white text-center text-2xl mb-4 outline-none">
            <button onclick="window.processPayout()" class="w-full bg-emerald-600 p-4 rounded-xl font-bold text-white shadow-lg active:scale-95 transition">Confirm & Upgrade</button>
        </div>
    </div>

    <div id="subModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-8 rounded-[2rem] max-w-md w-full border border-slate-800">
            <h2 class="text-xl font-bold mb-6 text-white text-center italic uppercase">Add Subscription</h2>
            <div class="space-y-4">
                <input type="text" id="subName" placeholder="Account / Firm Name" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Renewal Date</label>
                <input type="date" id="subDate" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                <input type="number" id="subCost" placeholder="Cost $" class="bg-slate-800 p-4 rounded-xl w-full text-white border border-slate-700 outline-none">
                <button onclick="window.createSubscription()" class="w-full bg-indigo-600 p-4 rounded-xl font-bold text-white mt-4 active:scale-95 transition">Save</button>
                <button onclick="window.closeModal('subModal')" class="w-full text-slate-500 text-xs font-bold mt-2 uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
